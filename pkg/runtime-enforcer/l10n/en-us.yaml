product:
  runtimeEnforcer: Runtime Enforcer
typeLabel:
  security.rancher.io.workloadpolicyproposal: Policy Proposals

runtimeEnforcer:
  policyProposals:
    title: Policy Proposals
    banner:
      text: Each proposal is generated by the runtime enforcer's learning engine and represents an observed application profile that can be promoted to an active policy. Want to learn more? Read our
      documentation: documentation
    filters:
      policy: Policy
      workload: Workload
      workloadType: Workload Type
      searchByName: Search by name
      any: Any
    actions:
      promote: Promote
      export: Export
      delete: Delete
      expandAll: Expand All
      collapseAll: Collapse All
    columns:
      policy: Policy
      namespace: Namespace
      workload: Workload
      workloadType: Workload Type
      containers: Containers
      executables: Executables
      age: Age
      containerName: Container
    selectedCount: |-
      {count, plural,
      =1 {policy proposal selected}
      other {policy proposals selected}
      }
    age:
      days: '{count} day | {count} days'
      hours: '{count} hour | {count} hours'
      minutes: '{count} minute | {count} minutes'
      justNow: just now
    fallback:
      na: N/A
      unnamedPolicy: Unnamed Policy
      noDescription: No additional details available.
      unknownAge: Unknown
    errors:
      loadFailed: Failed to load policy proposals.
    empty: No policy proposals found for the current filters.
  installationWizard:
    entry:
      title: Runtime Enforcer Installation
      description: Configure global repository authentication, add required OCI repositories, and install SUSE Security Runtime Enforcer dependencies.
    globalRepoAuth:
      step: Global Repository Authentication
      title: Global Repository Authentication
      description: Provide a global OCI authentication secret and optional TLS settings for chart repositories.
      caBundle: CA Bundle
      caBundlePlaceholder: Paste custom CA certificate content if required
      readFromFile: Read from File
      skipTlsVerification: Skip TLS verification
      allowPlainHttp: Allow plain HTTP
      secretNamespaces: Image Pull Secret Namespaces
      secretNamespacesDescription: Specify namespaces where image pull secrets and charts will be applied.
    namespaces:
      certManager: Cert-Manager Namespace
      csiDriver: Cert-Manager CSI Driver Namespace
      runtimeEnforcer: Runtime Enforcer Namespace
    placeholders:
      certManagerNamespace: cert-manager
      runtimeEnforcerNamespace: cattle-runtime-enforcer-system
    repositories:
      step: Add Required Repositories
      title: Add Required Repositories
      description: Add Cert-Manager, Cert-Manager CSI Driver, and SUSE Security Runtime Enforcer repositories.
    install:
      step: Install Charts
      certManager: Install Cert-Manager
      csiDriver: Install Cert-Manager CSI Driver
      runtimeEnforcer: Install SUSE Security Runtime Enforcer
      runtimeEnforcerButton: Install Runtime Enforcer
      certManagerDescription:
        Install and configure Cert-Manager through Rancher manager to satisfy the certificate requirements for SUSE Security Runtime Enforcer.
      csiDriverDescription:
        The cert-manager-csi-driver is used to automatically provision and mount TLS certificates directly inside SUSE Security Runtime Enforcer pods (agent and OTEL collector) without creating intermediate Secret resources.
      runtimeEnforcerDescription:
        The Runtime-Enforcer ships with a standalone OTEL collector Deployment that handles violation metrics and events forwarding. No external OpenTelemetry Collector is needed for a basic setup.
    button:
      start: Start Installation
      continue: Continue
  policyProposal:
    label: Policy Proposal
    action:
      editPolicy: Edit Policy
      export: Export
      delete: Delete
      promote: Promote
    masthead:
      namespace: Namespace
      workload: Workload
      workloadType: Workload Type
      containers: Containers
      executables: Executables
      age: Age
    containers:
      title: Containers
      table:
        container: Container
        image: Image
        executables: Executables
    exportDialog:
      title:
        single: Export as active policy
        bulk: Export as active policies
      banner:
        single: Before exporting, we will automatically convert the policy proposal to an active policy. This way you will be able to easily import it later into another environment.
        bulk: Before exporting, we will automatically convert each policy proposal to an active policy. This way you will be able to easily import it later into another environment.
      confirm:
        single: 'Are you sure you want to export the <b>{name}</b> policy proposal as an active policy? If so, please select the target mode below.'
        bulk: 'Are you sure you want to export the <b>selected policy proposals ({count})</b> as active policies? If so, please select the target mode below.'
      mode:
        monitor: Monitor mode
        protect: Protect mode
      cancel: Cancel
      export: Export